<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria de Design</title>

<!-- Fonte e ícones -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  /* Reset e fontes */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Roboto', sans-serif; }
  body {
    background: url('https://i.ibb.co/4ZC1Z9x/fundo.png') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.5);
  }

  header h1 { font-size: 2.5rem; }

  .social-icons {
    margin-top: 10px;
  }

  .social-icons a {
    color: #fff;
    margin: 0 10px;
    font-size: 1.5rem;
    transition: 0.3s;
  }

  .social-icons a:hover { color: #ff6347; }

  /* Galeria */
  .gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
    gap: 15px;
  }

  .gallery-item {
    width: 250px;
    height: 250px;
    overflow: hidden;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gallery-item img, .gallery-item video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .gallery-item:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.6);
  }

  /* iSlide */
  .islide {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding-bottom: 20px;
  }

  .islide::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<header>
  <h1>Galeria de Design</h1>
  <div class="social-icons">
    <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="#" target="_blank"><i class="fab fa-twitter"></i></a>
    <a href="#" target="_blank"><i class="fab fa-facebook"></i></a>
  </div>
</header>

<section class="islide gallery">
  <!-- Adicione suas imagens/GIFs aqui -->
  <div class="gallery-item"><img src="https://i.ibb.co/1v8XkzR/design1.jpg" alt="Design 1"></div>
  <div class="gallery-item"><img src="https://i.ibb.co/xjrgF0k/design2.gif" alt="GIF Animado"></div>
  <div class="gallery-item"><img src="https://i.ibb.co/0Z4P7Bv/design3.jpg" alt="Design 3"></div>
  <div class="gallery-item"><img src="https://i.ibb.co/TL7zFfL/design4.gif" alt="GIF Animado"></div>
  <div class="gallery-item"><img src="https://i.ibb.co/fSf2Y6c/design5.jpg" alt="Design 5"></div>
</section>

<script>
  // iSlide automático
  const islide = document.querySelector('.islide');
  let scrollAmount = 0;
  function autoSlide() {
    scrollAmount += 1;
    if(scrollAmount >= islide.scrollWidth - islide.clientWidth){
      scrollAmount = 0;
    }
    islide.scrollTo({left: scrollAmount, behavior: 'smooth'});
  }
  setInterval(autoSlide, 30);
</script>

</body>
</html>
